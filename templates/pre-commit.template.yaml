# Pre-commit hook config — drop into project root as .pre-commit-config.yaml
# Then: pre-commit install && pre-commit install --hook-type pre-push
# Enforces: no commit without tests, lint clean, no obvious secrets,
# and close-the-loop (no code push without living-tier doc updates)

repos:
  # ---- Close the loop (workflow.md) — runs at push time ----
  # Rejects pushes that change code but touch neither .spec/** nor devlog/todo.
  # Only active in repos that have a .spec/ directory.
  - repo: local
    hooks:
      - id: close-the-loop
        name: living-tier docs updated (close the loop)
        entry: python ~/.ai-workflow/scripts/check_close_the_loop.py
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  # ---- Universal ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # ---- Secret scanning ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

